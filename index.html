<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:96px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:20px; line-height:1.9;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
a{color:inherit;text-decoration:none;}

/* ---------- sidebar ---------- */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 80%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;color:var(--gold);
  transition:color .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:3px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;padding-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 4px;width:100%;cursor:pointer;transition:background .2s;border-radius:6px;}
.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(212,196,168,.4);
  font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:600;
  color:var(--sbText);transition:all .25s;}
.sb-label{font-size:11.5px;letter-spacing:.3px;opacity:.86;
  font-family:"Noto Sans TC",sans-serif;text-align:center;line-height:1.3;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);
  box-shadow:0 0 12px rgba(184,134,11,.6);}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;}

#sbToggle{display:none;position:fixed;left:12px;top:12px;z-index:130;
  width:42px;height:42px;border-radius:8px;border:1px solid var(--border);
  background:var(--sbBg);color:var(--gold);font-size:20px;cursor:pointer;}

/* ---------- main ---------- */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;overflow:hidden;background:var(--headGrad);
  color:#f5ecd8;text-align:center;padding:78px 24px 64px;}
.site-hero::before{content:"往生";position:absolute;font-size:340px;font-weight:900;
  color:rgba(212,168,75,.035);left:50%;top:50%;transform:translate(-50%,-50%);
  font-family:"Noto Serif TC",serif;pointer-events:none;white-space:nowrap;}
.hero-eyebrow{font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:5px;
  color:var(--goldL);opacity:.8;margin-bottom:18px;}
.hero-title{font-size:56px;font-weight:900;color:var(--goldL);letter-spacing:6px;margin:0 0 8px;}
.hero-subtitle{font-size:24px;color:#e8dcc2;letter-spacing:3px;margin:0 0 18px;font-weight:600;}
.hero-meta{font-size:16px;color:#cbbb9a;letter-spacing:1.5px;line-height:1.9;}
.hero-range{display:inline-block;margin-top:20px;font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;color:var(--goldL);
  border:1px solid rgba(184,134,11,.5);border-radius:24px;padding:7px 22px;}

/* ---------- preface ---------- */
.preface{max-width:860px;margin:0 auto;padding:48px 28px 8px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);font-weight:700;
  letter-spacing:3px;margin:0 0 26px;position:relative;}
.preface-title::after{content:"";display:block;width:56px;height:3px;
  background:var(--gold);margin:14px auto 0;border-radius:2px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 18px;text-indent:2em;}

/* ---------- TOC ---------- */
.toc-section{max-width:1100px;margin:36px auto 0;padding:40px 28px 8px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);font-weight:700;letter-spacing:8px;margin:0 0 8px;}
.toc-desc{text-align:center;font-size:17px;color:var(--text-muted);letter-spacing:2px;margin:0 0 30px;
  font-family:"Noto Sans TC",sans-serif;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.toc-card{display:flex;align-items:center;gap:16px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;padding:16px 20px;
  transition:all .25s;box-shadow:0 1px 3px rgba(91,58,41,.06);}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(91,58,41,.14);border-color:var(--gold);}
.toc-num{flex:none;width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;
  font-family:"Noto Serif TC",serif;}
.toc-name{font-size:19.5px;line-height:1.7;color:var(--text);font-weight:600;}

/* ---------- chapters ---------- */
.main > .chapter{margin:42px 0 0;}
.ch-head{background:var(--headGrad);color:#f5ecd8;text-align:center;
  padding:42px 24px 40px;position:relative;}
.ch-head::after{content:"";display:block;width:64px;height:3px;background:var(--gold);
  margin:18px auto 0;border-radius:2px;}
.ch-head-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:3px;
  color:var(--goldL);opacity:.9;margin-bottom:10px;}
.ch-head-name{font-size:34px;font-weight:700;color:#f0e2c4;letter-spacing:2px;line-height:1.4;}
.ch-head-sub{font-size:17px;color:#cbbb9a;letter-spacing:1.5px;margin-top:12px;}
.ch-body{max-width:980px;margin:0 auto;padding:30px 24px 8px;}

.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}

.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}

.next-link{display:inline-block;margin:18px 0 8px;font-family:"Noto Sans TC",sans-serif;
  font-size:17px;color:var(--accent);border:1px solid var(--gold);border-radius:24px;
  padding:9px 24px;transition:all .25s;letter-spacing:1px;}
.next-link:hover{background:var(--gold);color:#fff;}

/* ---------- progress ---------- */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

#backTop{position:fixed;right:24px;bottom:24px;width:44px;height:44px;border-radius:50%;
  background:var(--sbBg);color:var(--gold);border:1px solid rgba(184,134,11,.5);
  font-size:20px;cursor:pointer;z-index:120;opacity:0;pointer-events:none;
  transition:opacity .3s;display:flex;align-items:center;justify-content:center;}
#backTop.show{opacity:1;pointer-events:auto;}

.site-footer{background:var(--headGrad);color:#cbbb9a;text-align:center;
  padding:40px 24px;margin-top:48px;font-size:15px;line-height:2;letter-spacing:1px;}
.site-footer .ft-title{color:var(--goldL);font-size:18px;font-weight:700;letter-spacing:3px;margin-bottom:10px;}

@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .hero-title{font-size:40px;} .ch-head-name{font-size:26px;}
  .site-hero{padding:60px 18px 48px;}
}
@media(max-width:600px){
  body{font-size:17px;} .hero-title{font-size:32px;}
  .toc-grid{grid-template-columns:1fr;}
}

<button aria-label="回到頂部" id="backTop">↑</button>
<script>
/* ---------- sidebar toggle (mobile) ---------- */
var sb=document.getElementById('sb'), sbToggle=document.getElementById('sbToggle');
if(sbToggle){sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});}

/* ---------- brand back to top ---------- */
var sbBrand=document.getElementById('sbBrand');
if(sbBrand){sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});}

/* ---------- back to top button ---------- */
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){
  if(window.scrollY>600){backTop.classList.add('show');}else{backTop.classList.remove('show');}
},{passive:true});
if(backTop){backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});}

/* ---------- progress ---------- */
var rpFill=document.getElementById('rpFill'), rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});
updateProgress();
(function(){
  var cap=document.getElementById('readProgress'); if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[]; var f1=document.querySelector('[data-wy-notice="v2"]'); if(f1)targets.push(f1);
  var f2=document.querySelector('.site-footer'); if(f2)targets.push(f2);
  if(!targets.length)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;}); setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  }else{
    var check=function(){var dh=document.documentElement.scrollHeight;var sb2=window.scrollY+window.innerHeight;setHide(dh-sb2<240);};
    window.addEventListener('scroll',check,{passive:true});check();
  }
})();

/* ---------- sidebar active highlight ---------- */
var sbItems=document.querySelectorAll('.sb-item');
var sections=document.querySelectorAll('.chapter');
function highlight(){
  var cur=null;
  sections.forEach(function(s){
    if(s.getBoundingClientRect().top < window.innerHeight*0.35) cur=s;
  });
  sbItems.forEach(function(it){
    var on = cur && it.getAttribute('data-ch')===cur.id.replace('ch-','');
    it.classList.toggle('active',!!on);
    if(on){
      var r=it.getBoundingClientRect();
      if(r.top<60||r.bottom>window.innerHeight-60){it.scrollIntoView({block:'center',behavior:'smooth'});}
    }
  });
}
window.addEventListener('scroll',highlight,{passive:true}); highlight();

/* ---------- iframe auto height ---------- */
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body)return;
    d.body.style.minHeight='0'; d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}
  else{f.addEventListener('load',tick);}
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

/* ---------- anchor click fix ---------- */
document.addEventListener('click',function(e){
  var a=e.target;
  while(a&&a.tagName!=='A')a=a.parentElement;
  if(!a)return;
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);
  var el=document.getElementById(id);
  if(!el)return;
  e.preventDefault();
  if(sb&&sb.classList.contains('open'))sb.classList.remove('open');
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});
  },60);
},true);

/* ---------- continuous recalc ---------- */
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

/* ---------- anti-copy (outer) ---------- */
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy38dzdl-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
